<html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIM卡管理平台 - SIM卡管理</title>
  <style>
    :root {
      --blue: #1687e8;
      --blue-light: #edf6ff;
      --blue-button: #2f91f1;
      --green: #06a77d;
      --bg: #f5f7fb;
      --border: #e6ebf2;
      --input-border: #dfe5ee;
      --text: #333;
      --muted: #7e8997;
      --table-text: rgb(96, 98, 102);
      --shadow: 0 8px 28px rgba(20, 44, 80, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      color: var(--text);
      background: var(--bg);
      font: 12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      overflow: hidden;
    }

    button {
      color: inherit;
      font: inherit;
      border: 0;
      cursor: pointer;
      background: transparent;
    }

    input {
      font: inherit;
    }

    .topbar {
      position: relative;
      z-index: 20;
      height: 59px;
      display: flex;
      align-items: center;
      color: #fff;
      background: linear-gradient(90deg, #1687e8 0%, #0b9bc9 52%, #02a99c 100%);
      box-shadow: 0 1px 4px rgba(18, 96, 151, 0.18);
    }

    .logo {
      flex: 0 0 220px;
      height: 59px;
      display: flex;
      align-items: center;
      padding-left: 19px;
      gap: 11px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .diamond {
      width: 10px;
      height: 10px;
      transform: rotate(45deg);
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.72);
    }

    .top-actions {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 22px;
      margin-left: auto;
      padding-right: 21px;
    }

    .bell {
      position: relative;
      width: 16px;
      height: 18px;
    }

    .bell::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 11px;
      height: 12px;
      border: 1.3px solid rgba(255, 255, 255, 0.9);
      border-radius: 8px 8px 4px 4px;
    }

    .bell::after {
      content: "";
      position: absolute;
      left: 6px;
      bottom: 1px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #fff;
    }

    .dot {
      position: absolute;
      top: 1px;
      right: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ff605e;
      border: 1px solid #fff;
    }

    .account {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 25px;
      height: 25px;
      line-height: 25px;
      text-align: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    .layout {
      height: calc(100vh - 59px);
      display: flex;
    }

    .sidebar {
      flex: 0 0 226px;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      color: #4d5664;
      background: #fff;
      border-right: 1px solid #e5eaf1;
    }

    .menu-title {
      position: relative;
      width: 100%;
      height: 47px;
      padding: 0 17px 0 19px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      font-size: 13px;
    }

    .menu-title.active {
      color: var(--blue);
      background: #eef6ff;
    }

    .menu-title.active::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 3px;
      background: var(--blue);
    }

    .device-icon {
      position: relative;
      display: inline-block;
      width: 15px;
      height: 14px;
      border: 1.3px solid #5e6d80;
      border-radius: 2px;
    }

    .device-icon::after {
      content: "";
      position: absolute;
      left: 3px;
      right: 3px;
      bottom: 2px;
      height: 1px;
      background: #5e6d80;
    }

    .menu-arrow {
      margin-left: auto;
      width: 7px;
      height: 7px;
      border-right: 1px solid #8b96a6;
      border-bottom: 1px solid #8b96a6;
      transform: rotate(45deg);
      transition: transform 0.2s;
    }

    .collapsed .menu-arrow {
      transform: rotate(-45deg);
    }

    .submenu {
      max-height: 240px;
      overflow: hidden;
      transition: max-height 0.22s ease;
    }

    .collapsed .submenu {
      max-height: 0;
    }

    .submenu-btn {
      position: relative;
      display: block;
      height: 39px;
      width: 100%;
      padding-left: 45px;
      color: #667182;
      text-align: left;
    }

    .submenu-btn.active {
      color: var(--blue);
      background: #eef6ff;
    }

    .submenu-btn.active::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 3px;
      background: var(--blue);
    }

    .main {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .breadcrumb-bar {
      flex: 0 0 42px;
      height: 42px;
      display: flex;
      align-items: stretch;
      padding-left: 12px;
      background: #fff;
      border-bottom: 1px solid #e6ebf2;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .breadcrumb-item {
      position: relative;
      min-width: 112px;
      height: 42px;
      padding: 0 30px 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #667182;
      border-right: 1px solid #edf1f5;
      border-bottom: 2px solid transparent;
      background: #fff;
      white-space: nowrap;
    }

    .breadcrumb-item:hover {
      color: var(--blue);
      background: #f7fbff;
    }

    .breadcrumb-item.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      background: #fff;
      font-weight: 500;
    }

    .breadcrumb-close {
      position: absolute;
      top: 6px;
      right: 7px;
      width: 16px;
      height: 16px;
      color: #9aa4b1;
      line-height: 15px;
      text-align: center;
      border-radius: 50%;
    }

    .breadcrumb-close:hover {
      color: #fff;
      background: #b8c2cf;
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px;
      display: flex;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .page-panel {
      min-height: 100%;
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .inner-tabs {
      height: 44px;
      padding: 0 18px;
      display: flex;
      align-items: flex-end;
      gap: 26px;
      background: #fff;
      border-bottom: 1px solid #edf1f5;
    }

    .inner-tab {
      height: 42px;
      padding: 0 2px;
      color: #667182;
      border-bottom: 2px solid transparent;
      font-size: 13px;
    }

    .inner-tab:hover {
      color: var(--blue);
    }

    .inner-tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      font-weight: 500;
    }

    .home-page {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 18px;
    }

    .metric-card {
      height: 94px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 26px 0 30px;
      background: #fff;
      border: 1px solid #eef2f6;
      box-shadow: 0 8px 20px rgba(35, 64, 100, 0.04);
    }

    .metric-icon {
      position: relative;
      width: 28px;
      height: 28px;
      border: 2px solid #48a5ff;
      border-radius: 50%;
      background: #f0f8ff;
    }

    .metric-icon::before,
    .metric-icon::after {
      content: "";
      position: absolute;
      background: currentColor;
    }

    .metric-icon.card {
      color: #7b8796;
      width: 22px;
      height: 26px;
      border-radius: 5px;
      border-color: #7b8796;
    }

    .metric-icon.card::before {
      left: 5px;
      right: 5px;
      top: 6px;
      height: 2px;
      box-shadow: 0 5px 0 currentColor, 0 10px 0 currentColor;
    }

    .metric-icon.active {
      color: #1687e8;
      border-style: dashed;
    }

    .metric-icon.flow {
      color: #43dba2;
      border-color: #6b8dff;
    }

    .metric-icon.flow::before {
      left: 6px;
      top: 13px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #43dba2;
      box-shadow: 10px 0 0 #43dba2;
    }

    .metric-icon.balance {
      color: #ff8b2f;
      border-color: #3b9cff;
    }

    .metric-icon.balance::before {
      left: 7px;
      top: 8px;
      width: 10px;
      height: 2px;
      background: #ff8b2f;
      box-shadow: 0 5px 0 #ff8b2f;
    }

    .metric-text {
      text-align: right;
    }

    .metric-label {
      margin-bottom: 6px;
      color: #9aa4b1;
      font-weight: 600;
    }

    .metric-value {
      color: #5d6470;
      font-size: 18px;
      font-weight: 700;
    }

    .home-middle {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(520px, 1fr);
      gap: 18px;
      min-height: 460px;
    }

    .home-panel {
      background: #fff;
      border: 1px solid #eef2f6;
      box-shadow: 0 8px 20px rgba(35, 64, 100, 0.035);
    }

    .donut-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 34px 34px 30px;
    }

    .donut {
      position: relative;
      width: 172px;
      height: 172px;
      margin-bottom: 48px;
      border-radius: 50%;
      background: conic-gradient(#3bdc9a 0deg 298deg, #ff5a61 298deg 350deg, #4db8f7 350deg 351deg, #ff9d75 351deg 351deg, #268fff 351deg 352deg, #a98cff 352deg 359deg, #91a4b6 359deg 360deg);
    }

    .donut::after {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: #fff;
    }

    .donut-center {
      position: absolute;
      z-index: 1;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .donut-value {
      font-size: 30px;
      line-height: 1.15;
      font-weight: 500;
    }

    .donut-label {
      margin-top: 6px;
      color: #8b95a5;
    }

    .status-legend {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(90px, 1fr));
      row-gap: 12px;
      column-gap: 28px;
      color: #6b7280;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 12px 1fr;
      grid-template-rows: auto auto;
      column-gap: 7px;
      align-items: center;
    }

    .legend-dot {
      grid-row: 1 / 3;
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-value {
      color: #4f5866;
      font-weight: 500;
    }

    .resource-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 28px 28px 40px;
    }

    .resource-box {
      min-height: 390px;
      border: 1px solid #e6ebf2;
      background: #fff;
      overflow: hidden;
    }

    .resource-title {
      margin-bottom: 14px;
      color: #2f9af1;
      font-size: 16px;
      font-weight: 600;
    }

    .chart-tabs {
      display: inline-flex;
      align-items: center;
      border: 1px solid #d9e2ed;
      border-radius: 3px;
      overflow: hidden;
      background: #fff;
    }

    .chart-tab {
      height: 30px;
      min-width: 58px;
      padding: 0 14px;
      color: #657182;
      background: #fff;
      border-right: 1px solid #d9e2ed;
    }

    .chart-tab:last-child {
      border-right: 0;
    }

    .chart-tab.active {
      color: #fff;
      background: #3b9cff;
      border-color: #3b9cff;
    }

    .resource-table {
      max-height: 302px;
      overflow: auto;
    }

    .resource-filter {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: minmax(140px, 180px) minmax(160px, 220px) minmax(160px, 220px) auto;
      gap: 10px;
      justify-content: start;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #e7ebf1;
      background: #fff;
    }

    .resource-filter label {
      min-width: 0;
    }

    .resource-filter .select-options {
      z-index: 25;
    }

    .resource-filter-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .resource-table table {
      min-width: 1080px;
      font-size: 12px;
    }

    .resource-table th,
    .resource-table td {
      border-right: 1px solid #edf1f5;
    }

    .resource-table th:last-child,
    .resource-table td:last-child {
      border-right: 0;
    }

    .chart-panel {
      min-height: 330px;
      padding: 18px 22px 22px;
    }

    .chart-head {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .chart-title {
      color: #2f9af1;
      font-size: 16px;
      font-weight: 600;
    }

    .line-chart {
      height: 220px;
      padding: 4px 6px 0;
    }

    .line-chart svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .filters {
      padding: 17px 18px 14px;
      border-bottom: 1px solid #f0f3f7;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      column-gap: 24px;
      row-gap: 14px;
      align-items: end;
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      color: #465163;
    }

    .required::before {
      content: "*";
      margin-right: 3px;
      color: #f05050;
    }

    .select {
      position: relative;
      height: 32px;
    }

    .select-trigger,
    .text-input {
      width: 100%;
      height: 32px;
      padding: 0 30px 0 11px;
      display: flex;
      align-items: center;
      color: #4c5666;
      background: #fff;
      border: 1px solid var(--input-border);
      border-radius: 3px;
      text-align: left;
    }

    .placeholder {
      color: #b8c0cc;
    }

    .text-input::placeholder {
      color: #b8c0cc;
    }

    .text-input:disabled {
      color: #b8c0cc;
      cursor: not-allowed;
      background: #f5f7fa;
    }

    .select.open .select-trigger,
    .text-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(22, 135, 232, 0.08);
    }

    .caret {
      position: absolute;
      top: 12px;
      right: 11px;
      width: 6px;
      height: 6px;
      border-right: 1px solid #9ca6b5;
      border-bottom: 1px solid #9ca6b5;
      transform: rotate(45deg);
      transition: transform 0.18s;
      pointer-events: none;
    }

    .select.open .caret {
      top: 15px;
      transform: rotate(225deg);
    }

    .clear-value {
      position: absolute;
      top: 8px;
      right: 28px;
      width: 16px;
      height: 16px;
      color: #99a5b5;
      line-height: 15px;
      text-align: center;
      border: 1px solid #c3cad4;
      border-radius: 50%;
      background: #fff;
    }

    .clear-value:hover {
      color: var(--blue);
      border-color: var(--blue);
    }

    .select-options {
      position: absolute;
      z-index: 15;
      top: 36px;
      left: 0;
      right: 0;
      max-height: 220px;
      overflow-y: auto;
      padding: 5px 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 3px;
      box-shadow: 0 7px 22px rgba(25, 52, 89, 0.13);
    }

    .select-option {
      display: block;
      height: 30px;
      width: 100%;
      padding: 0 11px;
      line-height: 30px;
      color: #596273;
      text-align: left;
    }

    .select-option:hover,
    .select-option.selected {
      color: var(--blue);
      background: #edf6ff;
    }

    .combo {
      position: relative;
    }

    .combo .text-input {
      padding-right: 30px;
    }

    .combo.open .text-input {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(22, 135, 232, 0.08);
    }

    .date-field {
      position: relative;
    }

    .date-trigger {
      width: 100%;
      height: 32px;
      padding: 0 30px 0 11px;
      display: flex;
      align-items: center;
      color: #4c5666;
      background: #fff;
      border: 1px solid var(--input-border);
      border-radius: 3px;
      text-align: left;
    }

    .date-field.open .date-trigger {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(22, 135, 232, 0.08);
    }

    .calendar-icon {
      position: absolute;
      top: 9px;
      right: 10px;
      width: 13px;
      height: 13px;
      border: 1px solid #99a5b5;
      border-radius: 2px;
      pointer-events: none;
    }

    .calendar-icon::before {
      content: "";
      position: absolute;
      top: 3px;
      left: 0;
      right: 0;
      border-top: 1px solid #99a5b5;
    }

    .date-popover {
      position: absolute;
      z-index: 16;
      right: 0;
      top: 37px;
      width: 296px;
      padding: 13px 12px 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 8px 25px rgba(25, 52, 89, 0.14);
    }

    .calendar-header {
      height: 27px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
    }

    .month-btn {
      width: 25px;
      height: 25px;
      color: #7f8998;
      border-radius: 3px;
      font-size: 18px;
    }

    .month-btn:hover {
      color: var(--blue);
      background: var(--blue-light);
    }

    .week,
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .week span {
      height: 27px;
      color: #8b95a5;
      line-height: 27px;
    }

    .day {
      position: relative;
      height: 29px;
      line-height: 29px;
      color: #525c6d;
    }

    .day:not(.empty):hover {
      color: var(--blue);
      background: #edf6ff;
    }

    .day.in-range {
      color: var(--blue);
      background: #edf6ff;
    }

    .day.start,
    .day.end {
      color: #fff;
      border-radius: 3px;
      background: var(--blue);
    }

    .calendar-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f0f3f7;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      height: 32px;
      min-width: 68px;
      padding: 0 15px;
      border-radius: 3px;
      transition: transform 0.13s ease, box-shadow 0.13s ease, background 0.13s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 12px rgba(22, 135, 232, 0.2);
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: none;
    }

    .btn-primary {
      color: #fff;
      background: var(--blue-button);
      border: 1px solid var(--blue-button);
    }

    .btn-primary:hover {
      background: #2587e8;
    }

    .btn-outline {
      color: var(--blue);
      background: #fff;
      border: 1px solid #58a6f2;
    }

    .btn-outline:hover {
      background: #edf6ff;
    }

    .btn-gray {
      color: #677384;
      background: #fff;
      border: 1px solid #d7dee7;
    }

    .btn-gray:hover {
      background: #f7f9fc;
    }

    .filter-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: auto;
      padding: 0 4px;
      color: var(--blue);
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .filter-toggle:hover {
      color: #0b69bd;
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .filter-toggle:active {
      transform: none;
    }

    .toggle-icon {
      width: 7px;
      height: 7px;
      border-right: 1px solid currentColor;
      border-bottom: 1px solid currentColor;
      transform: rotate(45deg);
      transition: transform 0.18s ease;
      margin-top: -3px;
    }

    .filter-toggle.expanded .toggle-icon {
      transform: rotate(225deg);
      margin-top: 3px;
    }

    .operate-bar {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .operate-actions {

      function copyText(text) {
        var fallbackCopy = function () {
          return new Promise(function (resolve, reject) {
          var input = document.createElement("textarea");
          input.value = text;
          input.setAttribute("readonly", "readonly");
          input.style.position = "fixed";
          input.style.left = "-9999px";
          input.style.top = "0";
          document.body.appendChild(input);
          input.focus();
          input.select();
          input.setSelectionRange(0, input.value.length);
          try {
            document.execCommand("copy");
            window.__lastCopiedICCID = text;
            resolve();
          } catch (error) {
            window.__lastCopiedICCID = text;
            resolve();
          } finally {
            document.body.removeChild(input);
          }
          });
        };
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text).catch(fallbackCopy);
        }
        return fallbackCopy();
      }

        return manageStopSubmittedIccids().reduce(function (list, iccid, index) {
          var row = state.esimRows.find(function (item) { return item.iccid === iccid; });
          var reasons = [];
          if (row) {
            if (row.serviceStart <= "2026-06-12" && row.serviceEnd >= "2026-06-12" && row.cardStatus !== "已销号") {
              reasons.push("存在生效中的套餐");
            }
            if (row.needRealName === "是" && row.realNameResult === "已实名") {
              reasons.push("已实名");
            }
            if (row.id % 3 === 0 || index === 2) {
              reasons.push("存在未清除的亲情号");
            }
          }
          if (reasons.length) {
            list.push({ iccid: iccid, reason: reasons.join("、") });
          }
          return list;
        }, []);

      function esimWritableStats(rows) {
        var abnormalStatusMap = { "已停用": true, "已失效": true, "已销号": true, "其他": true };
        var written = 0;
        var abnormal = 0;
        var platformCounts = {};
        var unallocated = 0;
        allocatedBusinessPlatformOptions.forEach(function (item) {
          platformCounts[item] = 0;
        });
        rows.forEach(function (row) {
          if (row.allocated === "是" && platformCounts.hasOwnProperty(row.businessPlatform)) {
            platformCounts[row.businessPlatform] += 1;
          } else {
            unallocated += 1;
          }
          if (row.writeStatus === "写卡成功") {
            written += 1;
          } else if (abnormalStatusMap[row.cardStatus]) {
            abnormal += 1;
          }
        });
        return {
          total: rows.length,
          writable: Math.max(rows.length - written - abnormal, 0),
          nonWritable: written + abnormal,
          written: written,
          abnormal: abnormal,
          platformCounts: platformCounts,
          unallocated: unallocated
        };
      }

      function showManageStopPopover(target) {
        var popover = $("#floating-popover");
        var rect = target.getBoundingClientRect();
        popover.innerHTML =
          '<div>停用原因：' + esc(target.dataset.reason) + "</div>" +
          '<div>停用时间：' + esc(target.dataset.time) + "</div>" +
          '<div>停用人：' + esc(target.dataset.user) + "</div>" +
          '<div>操作业务平台：' + esc(target.dataset.platform) + "</div>" +
          '<div>备注：' + esc(target.dataset.remark) + "</div>";
        popover.style.display = "block";
        var width = popover.offsetWidth || 282;
        var left = rect.left + rect.width / 2 - width / 2;
        left = Math.max(12, Math.min(left, window.innerWidth - width - 12));
        var top = rect.bottom + 10;
        if (top + popover.offsetHeight > window.innerHeight - 12) {
          top = Math.max(12, rect.top - popover.offsetHeight - 10);
        }
        popover.style.left = left + "px";
        popover.style.top = top + "px";
      }

          state.detectionApplied = Object.assign({}, state.detectionQuery);
          state.openSelect = "";
          renderOverlay();
          toast("已更新检测记录");
        } else if (action === "detection-reset") {
          state.detectionQuery = blankDetectionQuery();
          state.detectionApplied = blankDetectionQuery();
          state.openSelect = "";
          renderOverlay();
          toast("检测记录筛选条件已重置");
        } else if (action === "export-detection") {
          toast("检测记录导出任务已创建");
        } else if (action === "close-chip-detection-modal") {
          state.chipDetectionOpen = false;
          state.chipDetectionBatchNo = "";
          state.chipDetectionQuery = blankChipDetectionQuery();
          state.chipDetectionApplied = blankChipDetectionQuery();
          state.openSelect = "";
          renderOverlay();
        } else if (action === "chip-detection-search") {
          syncChipDetectionTextInputs();
          state.chipDetectionApplied = Object.assign({}, state.chipDetectionQuery);
          state.openSelect = "";
          renderOverlay();
          toast("已更新芯片检测记录");
        } else if (action === "chip-detection-reset") {
          state.chipDetectionQuery = blankChipDetectionQuery();
          state.chipDetectionApplied = blankChipDetectionQuery();
          state.openSelect = "";
          renderOverlay();
          toast("芯片检测记录筛选条件已重置");
        } else if (action === "export-chip-detection") {
          toast("芯片检测记录导出任务已创建");
        } else if (action === "open-esim-chip-stock") {
          state.esimChipStockOpen = true;
          state.esimChipStockType = "";
          state.esimChipStockSupplier = "";
          state.esimChipStockPlatform = "";
          state.esimChipStockFileName = "";
          state.esimChipStockRemark = "";
          state.openSelect = "";
          renderOverlay();
        } else if (action === "close-esim-chip-stock") {
          state.esimChipStockOpen = false;
          state.esimChipStockType = "";
          state.esimChipStockSupplier = "";
          state.esimChipStockPlatform = "";
          state.esimChipStockFileName = "";
          state.esimChipStockRemark = "";
          state.openSelect = "";
          renderOverlay();
        } else if (action === "download-chip-stock-template") {
          toast("ESIM芯片删除模板已下载");
        } else if (action === "confirm-esim-chip-stock") {
          if (!state.esimChipStockType) {
            toast("请选择操作类型");
            return;
          }
          if (!state.esimChipStockSupplier) {
            toast("请选择供应商");
            return;
          }
          if (!state.esimChipStockPlatform) {
            toast("请选择所属业务平台");
            return;
          }
          if (!state.esimChipStockFileName) {
            toast("请先选择导入文件");
            return;
          }
          var chipStockRemark = state.esimChipStockRemark.trim();
          var newChipBatchNo = "EC20260607" + String(state.esimChipRecordRows.length + 5).padStart(4, "0");
          state.esimChipRecordRows.unshift({
            id: state.esimChipRecordRows.reduce(function (max, item) { return Math.max(max, item.id); }, 0) + 1,
            batchNo: newChipBatchNo,
            operationType: state.esimChipStockType,
            supplier: state.esimChipStockSupplier,
            businessPlatform: state.esimChipStockPlatform,
            status: "成功",
            total: 1,
            success: 1,
            failed: 0,
            remark: chipStockRemark || ("文件：" + state.esimChipStockFileName),
            operatedAt: "2026-06-07 17:28:00",
            operator: "admin"
          });
          state.chipDetectionRows.unshift({
            batchNo: newChipBatchNo,
            eid: state.esimChipRows[0] ? state.esimChipRows[0].eid : "89033023425100000000000000000099",
            detectionStatus: "成功",
            failReason: "验证成功"
          });
          state.esimChipStockOpen = false;
          state.esimChipStockType = "";
          state.esimChipStockSupplier = "";
          state.esimChipStockPlatform = "";
          state.esimChipStockFileName = "";
          state.esimChipStockRemark = "";
          state.esimChipActiveTab = "records";
          state.openSelect = "";
          render();
          toast("ESIM芯片变更任务已提交");
        } else if (action === "export-esim-chip") {
          toast("ESIM芯片列表导出任务已创建");
        } else if (action === "export-esim-write-task") {
          toast("ESIM写卡任务列表导出任务已创建");
        } else if (action === "imei-stock") {
          toast("IMEI入库操作已触发");
        } else if (action === "refresh-esim-chip") {
          var refreshIcon = target.querySelector(".refresh-card");
          if (refreshIcon) {
            refreshIcon.classList.remove("spinning");
            void refreshIcon.offsetWidth;
            refreshIcon.classList.add("spinning");
            window.setTimeout(function () { refreshIcon.classList.remove("spinning"); }, 620);
          }
          toast("已刷新芯片：" + target.dataset.eid);
        } else if (action === "open-manage-stop-change") {
          state.manageStopChangeOpen = true;
          state.manageStopChangeStatus = "";
          state.manageStopChangePlatform = "";
          state.manageStopChangeReason = "";
          state.manageStopChangeMode = "file";
          state.manageStopChangeFileName = "";
          state.manageStopChangeCodes = "";
          state.manageStopChangeRemark = "";
          state.manageStopRiskOpen = false;
          state.manageStopRiskRows = [];
          state.openSelect = "";
          renderOverlay();
        } else if (action === "close-esim-allocate") {
          state.esimAllocateOpen = false;
          state.esimAllocateType = "";
          state.esimAllocatePlatform = "";
          state.esimAllocateMode = "file";
          state.esimAllocateFileName = "";
          state.esimAllocateCodes = "";
          state.esimAllocateRemark = "";
          state.openSelect = "";
          renderOverlay();
        } else if (action === "close-manage-stop-change") {
          state.manageStopChangeOpen = false;
          state.manageStopChangeStatus = "";
          state.manageStopChangePlatform = "";
          state.manageStopChangeReason = "";
          state.manageStopChangeMode = "file";
          state.manageStopChangeFileName = "";
          state.manageStopChangeCodes = "";
          state.manageStopChangeRemark = "";
          state.manageStopRiskOpen = false;
          state.manageStopRiskRows = [];
          state.openSelect = "";
          renderOverlay();
        } else if (action === "close-auth-config") {
          state.authConfigOpen = false;
          state.authFileName = "";
          renderOverlay();
        } else if (action === "set-auth-switch") {
          state.authSwitch = target.dataset.value;
          renderOverlay();
        } else if (action === "set-auth-ad-mode") {
          state.authAdMode = target.dataset.value;
          renderOverlay();
        } else if (action === "set-auth-input-mode") {
          state.authInputMode = target.dataset.mode;
          state.authFileName = "";
          renderOverlay();
        } else if (action === "set-esim-allocate-mode") {
          state.esimAllocateMode = target.dataset.mode;
          state.esimAllocateFileName = "";
          state.esimAllocateCodes = "";
          renderOverlay();
        } else if (action === "set-manage-stop-change-mode") {
          state.manageStopChangeMode = target.dataset.mode;
          state.manageStopChangeFileName = "";
          state.manageStopChangeCodes = "";
          renderOverlay();
        } else if (action === "cancel-manage-stop-risk") {
          state.manageStopRiskOpen = false;
          state.manageStopRiskRows = [];
          renderOverlay();
        } else if (action === "continue-manage-stop-risk") {
          submitManageStopChange(false);
        } else if (action === "skip-manage-stop-risk") {
          submitManageStopChange(true);
        } else if (action === "confirm-auth-config") {
          if (state.authInputMode === "file" && !state.authFileName) {
            toast("请先选择导入文件");
            return;
          }
          if (state.authInputMode === "manual" && !$("#authIccids").value.trim()) {
            toast("请输入ICCID");
            return;
          }
          state.authConfigOpen = false;
          state.authFileName = "";
          renderOverlay();
          toast("二次认证配置已提交");
        } else if (action === "confirm-esim-allocate") {
          if (!state.esimAllocateType) {
            toast("请选择操作类型");
            return;
          }
          if (!state.esimAllocatePlatform) {
            toast("请选择所属业务平台");
            return;
          }
          if (state.esimAllocateMode === "file" && !state.esimAllocateFileName) {
            toast("请先上传文件");
            return;
          }
          if (state.esimAllocateMode === "manual" && !state.esimAllocateCodes.trim()) {
            toast("请输入ICCID");
            return;
          }
          var submittedEsimAllocateType = state.esimAllocateType;
          state.esimAllocateOpen = false;
          state.esimAllocateType = "";
          state.esimAllocatePlatform = "";
          state.esimAllocateMode = "file";
          state.esimAllocateFileName = "";
          state.esimAllocateCodes = "";
          state.esimAllocateRemark = "";
          state.openSelect = "";
          renderOverlay();
          toast(submittedEsimAllocateType + "已提交");
        } else if (action === "confirm-manage-stop-change") {
          if (!state.manageStopChangeStatus) {
            toast("请选择变更状态");
            return;
          }
          if (state.manageStopChangeStatus === "管理停用" && !state.manageStopChangeReason) {
            toast("请选择停用原因");
            return;
          }
          if (!state.manageStopChangePlatform) {
            toast("请选择所属业务平台");
            return;
          }
          if (state.manageStopChangeMode === "file" && !state.manageStopChangeFileName) {
            toast("请先上传文件");
            return;
          }
          if (state.manageStopChangeMode === "manual" && !state.manageStopChangeCodes.trim()) {
            toast("请输入ICCID");
            return;
          }
          var riskRows = manageStopRiskRows();
          if (riskRows.length) {
            state.manageStopRiskRows = riskRows;
            state.manageStopRiskOpen = true;
            state.openSelect = "";
            renderOverlay();
            return;
          }
          submitManageStopChange(false);
        } else if (action === "download-template") {
          toast("导入模版已下载");
        } else if (action === "open-add") {
          state.addOpen = true;
          renderOverlay();
        } else if (action === "close-add") {
          state.addOpen = false;
          renderOverlay();
        } else if (action === "save-add") {
          var vendor = $("#addVendor").value.trim();
          var carrier = $("#addCarrier").value.trim();
          var platform = $("#addPlatform").value.trim();
          if (!vendor || !carrier || !platform) {
            toast("请填写供应商、运营商和运营商平台");
            return;
          }
          state.accountRows.unshift({
            id: state.accountRows.reduce(function (max, item) { return Math.max(max, item.id); }, 0) + 1,
            vendor: vendor,
            carrier: carrier,
            platform: platform,
            note: $("#addNote").value.trim() || "-",
            creator: "admin",
            created: "2026-05-28",
            updated: "2026-05-28 14:26"
          });
          state.addOpen = false;
          render();
          toast("运营商账户已添加");
        } else if (action === "edit") {
          state.editId = Number(target.dataset.id);
          renderOverlay();
        } else if (action === "close-edit") {
          state.editId = null;
          renderOverlay();
        } else if (action === "save-edit") {
          row = state.accountRows.find(function (item) { return item.id === state.editId; });
          row.platform = $("#editPlatform").value.trim() || row.platform;
          row.note = $("#editNote").value.trim() || row.note;
          row.updated = "2026-05-28 14:26";
          state.editId = null;
          render();
          toast("账户配置已保存");
        } else if (action === "delete") {
          state.confirmId = Number(target.dataset.id);
          renderOverlay();
        } else if (action === "cancel-delete") {
          state.confirmId = null;
          renderOverlay();
        } else if (action === "confirm-delete") {
          state.accountRows = state.accountRows.filter(function (item) { return item.id !== state.confirmId; });
          state.confirmId = null;
          render();
          toast("账户配置已删除");
        }
      });

      render();
    }());
  </script>
